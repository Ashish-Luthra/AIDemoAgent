name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test
    runs-on: ubuntu-latest

    # Ephemeral Postgres with pgvector so the retrieval integration tests
    # (describe.skipIf(!DATABASE_URL)) actually run in CI. pg_trgm ships in the
    # base postgres image; the vector extension ships in pgvector/pgvector.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: allyvate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/allyvate

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      # Creates pgvector + pg_trgm extensions and applies migrations, so the
      # retrieval integration tests have a schema to run against.
      - name: Migrate database
        run: pnpm run db:migrate

      # Includes the multi-tenant guard (schema-invariants.test.ts) and the
      # DATABASE_URL-gated retrieval integration tests (pgvector / BM25 / graph).
      - name: Test
        run: pnpm run test
